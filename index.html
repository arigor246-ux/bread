<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const PRODUCTS = [
            { id: 1, name: "לחם מחמצת כפרי", desc: "אפי על אבן, קרום פריך", price: 38, emoji: "🍞", bg: "#FAEEDA", accent: "#BA7517" },
            { id: 2, name: "חלה לשבת", desc: "קלועה, רכה ומתוקה", price: 32, emoji: "🥖", bg: "#FAECE7", accent: "#D85A30" },
            { id: 3, name: "לחם שיפון", desc: "עשיר בסיבים, עם זרעי כמון", price: 36, emoji: "🫓", bg: "#E1F5EE", accent: "#1D9E75" },
            { id: 4, name: "פיתות ביתיות (6 יח')", desc: "טריות, אווריריות ורכות", price: 24, emoji: "🥙", bg: "#EEEDFE", accent: "#7F77DD" }
        ];

        const S = {
            card: { background: "#fff", border: "0.5px solid #ccc", borderRadius: "12px", padding: "1rem", margin: "1rem" },
            input: { width: "100%", padding: "10px", margin: "10px 0", boxSizing: "border-box" },
            btnPay: { width: "100%", padding: "15px", background: "#BA7517", color: "#fff", border: "none", borderRadius: "8px", fontSize: "16px", cursor: "pointer" },
            btnBack: { width: "100%", padding: "15px", background: "#f0f0f0", border: "none", borderRadius: "8px", fontSize: "16px", cursor: "pointer" },
            qtyBtn: (color) => ({ width: 32, height: 32, borderRadius: "50%", border: `1px solid ${color || "#ccc"}`, background: "transparent", cursor: "pointer" })
        };

        function App() {
            const [cart, setCart] = useState({});
            const [screen, setScreen] = useState("shop");
            const [form, setForm] = useState({ name: "", phone: "" });

            const total = Object.entries(cart).reduce((sum, [id, qty]) => sum + (PRODUCTS.find(p => p.id == id).price * qty), 0);
            const cartCount = Object.values(cart).reduce((a, b) => a + b, 0);

            const setQty = (id, delta) => {
                setCart(prev => {
                    const newQty = (prev[id] || 0) + delta;
                    return newQty > 0 ? { ...prev, [id]: newQty } : { ...prev, [id]: undefined };
                });
            };

            if (screen === "shop") return (
                <div style={{ maxWidth: 400, margin: "0 auto", padding: 20 }}>
                    {PRODUCTS.map(p => (
                        <div key={p.id} style={S.card}>
                            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                <div style={{ width: 50, height: 50, background: p.bg, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8 }}>{p.emoji}</div>
                                <div style={{ flex: 1 }}>
                                    <p style={{ margin: 0, fontWeight: "bold" }}>{p.name}</p>
                                    <p style={{ margin: 0, fontSize: 12, color: "#666" }}>{p.desc}</p>
                                    <p style={{ margin: 0, color: p.accent }}>{p.price}₪</p>
                                </div>
                                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    {(cart[p.id] || 0) > 0 && <button onClick={() => setQty(p.id, -1)} style={S.qtyBtn(null)}>-</button>}
                                    <span style={{ fontWeight: "bold" }}>{cart[p.id] || 0}</span>
                                    <button onClick={() => setQty(p.id, 1)} style={S.qtyBtn(p.accent)}>+</button>
                                </div>
                            </div>
                        </div>
                    ))}
                    {cartCount > 0 && <button onClick={() => setScreen("order")} style={S.btnPay}>סיכום הזמנה ({total}₪)</button>}
                </div>
            );

            return (
                <div style={{ maxWidth: 400, margin: "0 auto", padding: 20 }}>
                    <h2 style={{ textAlign: "center" }}>פרטי הזמנה</h2>
                    <input type="text" placeholder="שם מלא" onChange={e => setForm({...form, name: e.target.value})} style={S.input} />
                    <input type="tel" placeholder="טלפון" onChange={e => setForm({...form, phone: e.target.value})} style={S.input} />
                   <button onClick={async () => {
    if(form.name && form.phone) {
        const webhookUrl = "https://hook.eu1.make.com/YOUR_WEBHOOK_ID"; // כאן שים את הלינק האמיתי מ-Make
        try {
            await fetch(webhookUrl, {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...form, cart, total, timestamp: new Date().toLocaleString() })
            });
            alert("ההזמנה נשלחה בהצלחה!");
        } catch (error) {
            alert("שגיאה בשליחה");
        }
    } else {
        alert("נא למלא שם וטלפון");
    }
}} style={S.btnPay}>שלח הזמנה</button> </button>
                    <button onClick={() => setScreen("shop")} style={{...S.btnBack, marginTop: 10}}>חזור לחנות</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
