<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>לחמים של אמא</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#f9f9f9}.container{max-width:450px;margin:0 auto;padding:1rem;background:white;min-height:100vh}.header{text-align:center;margin-bottom:3rem}body.home .header h1{color:white}body.home .header p{color:#aaa}body.home{background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%)}body.home .container{background:0}.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem}.product-card{background:rgba(255,255,255,.05);border:.5px solid rgba(255,255,255,.1);border-radius:12px;padding:1rem;text-align:center}.product-icon{width:100%;height:80px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:.75rem}.product-name{font-size:14px;font-weight:500;margin:0;color:#fff;display:block}.product-desc{font-size:11px;color:#aaa;margin:4px 0}.product-price{font-size:16px;font-weight:600;margin:8px 0}.qty-controls{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:.75rem}.qty-btn{width:32px;height:32px;border-radius:50%;border:.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;cursor:pointer;font-size:18px}.qty-btn.plus{border:0}.qty-display{font-weight:600;color:white}.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#BA7517 0%,#d4921f 100%);color:white;border:0;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}.btn-secondary{width:100%;padding:10px;background:0;border:.5px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;color:#666;margin-top:.5rem}.card{background:white;border:.5px solid #e0e0e0;border-radius:12px;padding:1rem;margin-bottom:.75rem}.label{font-size:13px;color:#666;display:block;margin-bottom:6px;font-weight:500}.input-field{width:100%;padding:10px;margin-bottom:12px;border:.5px solid #ddd;border-radius:8px;font-size:15px}.day-selector{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}.time-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}.btn-option{padding:9px;border-radius:8px;border:.5px solid #ddd;background:white;cursor:pointer;font-size:12px}.btn-option.active{border:2px solid #BA7517;background:#FAEEDA;color:#633806;font-weight:500}.payment-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.btn-payment{padding:12px;border-radius:8px;border:.5px solid #ddd;background:white;cursor:pointer;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:4px}.btn-payment.active{border:2px solid #BA7517;background:#FAEEDA;color:#633806;font-weight:500}.screen{display:none}.screen.active{display:block}.back-btn{background:0;border:0;cursor:pointer;font-size:22px;color:#999;padding:0;margin-bottom:1rem}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.confirm-check{width:64px;height:64px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px}.summary-item{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px}.summary-total{border-top:.5px solid #ddd;padding-top:10px;margin-top:10px;font-weight:500;display:flex;justify-content:space-between}</style></head><body><div id="app"></div><script>const PRODUCTS=[{id:1,name:"לחם לבן",desc:"רך וטרי",price:30,emoji:"🍞",bg:"#F5E6D3",accent:"#8B7355"},{id:2,name:"כוסמין לבן",desc:"בחיתוך עבה",price:38,emoji:"🥖",bg:"#F9F5F0",accent:"#A0826D"},{id:3,name:"פוקצ׳ה בינונית",desc:"שמן זית וומלח",price:60,emoji:"🫓",bg:"#FEF3E2",accent:"#C19A6B"},{id:4,name:"ג׳בטה",desc:"קטנה וטעימה",price:10,emoji:"🥐",bg:"#F5DEB3",accent:"#DAA520"},{id:5,name:"סינבון חלבי",desc:"עם קינמון וסוכר",price:80,emoji:"🧁",bg:"#FFE4C4",accent:"#D2691E"},{id:6,name:"חמאת בזיליקום פלטה",desc:"בטעם בזיליקום טרי",price:80,emoji:"🧈",bg:"#F0E68C",accent:"#B8860B"},{id:7,name:"שמרים פרוה",desc:"טרי וחזק",price:65,emoji:"🍃",bg:"#E6F3E6",accent:"#6B8E23"},{id:8,name:"חלות",desc:"קלועות וטעימות",price:40,emoji:"🥖",bg:"#FFDAB9",accent:"#FF6347"}];const DAYS=["יום שני","יום שלישי","יום רביעי","יום חמישי","יום שישי"];const TIMES={"יום שני":["10:00","11:00","12:00","13:00","14:00","15:00","16:00"],"יום שלישי":["10:00","11:00","12:00","13:00","14:00","15:00","16:00"],"יום רביעי":["10:00","11:00","12:00","13:00","14:00","15:00","16:00"],"יום חמישי":["10:00","11:00","12:00","13:00","14:00","15:00","16:00"],"יום שישי":["08:00","09:00","10:00","11:00","12:00"]};const WEBHOOK="https://hook.eu1.make.com/v90j9kxeibgy1mftgvl5jliuiclb24ny";let cart={},form={name:"",phone:"",day:"יום שני",time:"10:00"},payment={method:"card",number:"",expiry:"",cvv:"",bit:""},screen="home";function render(){const app=document.getElementById("app");const total=Object.entries(cart).reduce((s,[id,q])=>s+(PRODUCTS.find(p=>p.id===+id)?.price||0)*q,0);const cartCount=Object.values(cart).reduce((a,b)=>a+b,0);document.body.className=screen==="home"?"home":"";if(screen==="home"){app.innerHTML=`<div class="container"><div class="header"><h1>לחמים של אמא</h1><p>אפייה ביתית, מוכנה באהבה</p></div><div class="product-grid">${PRODUCTS.map(p=>`<div class="product-card"><div class="product-icon" style="background:${p.bg}">${p.emoji}</div><p class="product-name">${p.name}</p><p class="product-desc">${p.desc}</p><p class="product-price" style="color:${p.accent}">${p.price}₪</p><div class="qty-controls">${(cart[p.id]||0)>0?`<button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button><span class="qty-display">${cart[p.id]}</span>`:''}<button class="qty-btn plus" style="background:${p.accent}" onclick="changeQty(${p.id},1)">+</button></div></div>`).join('')}</div>${cartCount>0?`<button class="btn-primary" onclick="screen='order';render()">🛒 ${cartCount} פריטים · ${total}₪</button>`:'<p style="text-align:center;color:#aaa;padding:2rem">בחר מוצרים כדי להתחיל 👆</p>'}</div>`;}else if(screen==="order"){app.innerHTML=`<div class="container"><button class="back-btn" onclick="screen='home';render()">‹</button><h2 style="margin-bottom:1.25rem;font-size:18px">סיכום הזמנה</h2><div class="card"><p style="font-size:13px;color:#999;margin:0 0 10px">הפריטים שלך</p>${Object.entries(cart).map(([id,qty])=>{const p=PRODUCTS.find(p=>p.id===+id);return`<div class="summary-item"><span>${p.name} ×${qty}</span><span style="font-weight:500">${p.price*qty}₪</span></div>`;}).join('')}<div class="summary-total"><span>סה״כ לתשלום</span><span>${total}₪</span></div></div><div class="card"><p style="font-size:13px;color:#999;margin:0 0 12px;font-weight:500">פרטי איסוף</p><label class="label">שם מלא</label><input class="input-field" placeholder="ישראל ישראלי" value="${form.name}" onchange="form.name=this.value"/><label class="label">טלפון</label><input class="input-field" type="tel" placeholder="050-0000000" value="${form.phone}" onchange="form.phone=this.value"/><label class="label">יום איסוף</label><div class="day-selector">${DAYS.map(d=>`<button class="btn-option ${form.day===d?'active':''}" onclick="form.day='${d}';form.time=TIMES['${d}'][0];render()">${d}</button>`).join('')}</div><label class="label">שעת איסוף</label><div class="time-selector">${TIMES[form.day].map(t=>`<button class="btn-option ${form.time===t?'active':''}" onclick="form.time='${t}';render()">${t}</button>`).join('')}</div></div><div class="card"><p style="font-size:13px;color:#999;margin:0 0 12px;font-weight:500">אמצעי תשלום</p><div class="payment-methods"><button class="btn-payment ${payment.method==='card'?'active':''}" onclick="payment.method='card';render()"><span style="font-size:20px">💳</span>כרטיס אשראי</button><button class="btn-payment ${payment.method==='bit'?'active':''}" onclick="payment.method='bit';render()"><span style="font-size:20px">📱</span>ביט</button></div></div>${payment.method==='card'?`<div class="card"><label class="label">מספר כרטיס</label><input class="input-field" placeholder="0000 0000 0000 0000" value="${payment.number}" onchange="payment.number=this.value.replace(/\\D/g,'').slice(0,16).replace(/(..)/g,'$1 ').trim()"/><div class="grid-2"><div><label class="label">תוקף</label><input class="input-field" placeholder="MM/YY" value="${payment.expiry}" onchange="const d=this.value.replace(/\\D/g,'').slice(0,4);payment.expiry=d.length>2?d.slice(0,2)+'/'+d.slice(2):d"/></div><div><label class="label">CVV</label><input class="input-field" placeholder="CVV" maxlength="3" value="${payment.cvv}" onchange="payment.cvv=this.value.replace(/\\D/g,'').slice(0,3)"/></div></div></div>`:`<div class="card"><label class="label">מספר ביט</label><input class="input-field" placeholder="*50-XXXXXXX" value="${payment.bit}" onchange="payment.bit=this.value"/></div>`}<button class="btn-primary" onclick="handlePay()" style="background:#1D9E75">🔒 שלם ${total}₪ ובצע הזמנה</button><button class="btn-secondary" onclick="screen='home';render()">חזרה לתפריט</button></div>`;}else if(screen==="confirm"){app.innerHTML=`<div class="container"><div class="confirm-check">✅</div><h2 style="text-align:center;margin:0 0 0.5rem">ההזמנה אושרה ושולמה!</h2><p style="text-align:center;color:#999;font-size:14px">תודה ${form.name}! נראה אותך ${form.day} בשעה ${form.time}.</p><div class="card"><p style="font-size:13px;color:#999;margin:0 0 10px">פרטי הזמנה</p>${Object.entries(cart).map(([id,qty])=>{const p=PRODUCTS.find(p=>p.id===+id);return`<div class="summary-item"><span>${p.name} ×${qty}</span><span>${p.price*qty}₪</span></div>`;}).join('')}<div class="summary-total"><span>שולם</span><span style="color:#1D9E75">${total}₪</span></div></div><button class="btn-primary" onclick="resetApp()" style="background:#BA7517">הזמנה חדשה</button></div>`;}}function changeQty(id,delta){const current=cart[id]||0;const next=Math.max(0,current+delta);if(next===0)delete cart[id];else cart[id]=next;render()}async function handlePay(){if(!form.name.trim()||!/^0\d{8,9}$/.test(form.phone.replace(/\s/g,""))){alert("נא למלא שם וטלפון תקיניים");return}if(payment.method==="card"){if(payment.number.replace(/\s/g,"").length<16){alert("מספר כרטיס לא תקין");return}}else if(payment.method==="bit"){if(!payment.bit.trim()){alert("נא להזין מספר ביט");return}}const orderData={customerName:form.name,phone:form.phone,pickupDay:form.day,pickupTime:form.time,items:Object.entries(cart).map(([id,qty])=>{const p=PRODUCTS.find(p=>p.id===+id);return{name:p.name,qty,unitPrice:p.price,subtotal:p.price*qty}}),total:Object.entries(cart).reduce((s,[id,q])=>s+(PRODUCTS.find(p=>p.id===+id)?.price||0)*q,0),orderDate:new Date().toLocaleDateString("he-IL"),orderTimestamp:new Date().toISOString()};try{await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(orderData)});screen="confirm";render()}catch(err){alert("שגיאה בשליחת ההזמנה")}}function resetApp(){cart={};form={name:"",phone:"",day:"יום שני",time:"10:00"};payment={method:"card",number:"",expiry:"",cvv:"",bit:""};screen="home";render()}render();</script></body></html>
