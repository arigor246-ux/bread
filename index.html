<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const PRODUCTS = [
            { id: 1, name: "לחם מחמצת כפרי", price: 38, emoji: "🍞", bg: "#FAEEDA", accent: "#BA7517" },
            { id: 2, name: "חלה לשבת", price: 32, emoji: "🥖", bg: "#FAECE7", accent: "#D85A30" }
        ];

        function App() {
            const [cart, setCart] = useState({});
            const [screen, setScreen] = useState("shop");
            const [form, setForm] = useState({ name: "", phone: "" });

            const setQty = (id, delta) => {
                setCart(prev => {
                    const newQty = (prev[id] || 0) + delta;
                    return newQty > 0 ? { ...prev, [id]: newQty } : { ...prev, [id]: undefined };
                });
            };

            if (screen === "shop") {
                return (
                    <div style={{ maxWidth: 400, margin: "0 auto", padding: 20 }}>
                        {PRODUCTS.map(p => (
                            <div key={p.id} style={{ display: "flex", alignItems: "center", padding: 10, borderBottom: "1px solid #eee" }}>
                                <div>{p.emoji} {p.name}</div>
                                <button onClick={() => setQty(p.id, -1)}>-</button>
                                <span>{cart[p.id] || 0}</span>
                                <button onClick={() => setQty(p.id, 1)}>+</button>
                            </div>
                        ))}
                        <button onClick={() => setScreen("order")}>סיכום הזמנה</button>
                    </div>
                );
            }

            return (
                <div style={{ maxWidth: 400, margin: "0 auto", padding: 20 }}>
                    <h2>פרטי הזמנה</h2>
                    <input type="text" placeholder="שם מלא" onChange={e => setForm({...form, name: e.target.value})} />
                    <input type="tel" placeholder="טלפון" onChange={e => setForm({...form, phone: e.target.value})} />
                    <button onClick={() => alert("הזמנה נקלטה: " + form.name)}>שלח הזמנה</button>
                    <button onClick={() => setScreen("shop")}>חזור לחנות</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
