<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --color-background-primary: #fff; --color-border-tertiary: #ccc; --border-radius-lg: 12px; --border-radius-md: 8px; --color-text-secondary: #666; --color-text-primary: #000; --color-text-danger: red; --color-border-danger: red; --color-border-secondary: #ddd; --color-background-secondary: #f0f0f0; --color-text-tertiary: #999; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const PRODUCTS = [
            { id: 1, name: "לחם מחמצת כפרי", desc: "אפוי על אבן, קרום פריך", price: 38, emoji: "🍞", bg: "#FAEEDA", accent: "#BA7517" },
            { id: 2, name: "חלה לשבת", desc: "קלועה, רכה ומתוקה קלות", price: 32, emoji: "🥖", bg: "#FAECE7", accent: "#D85A30" },
            { id: 3, name: "לחם שיפון", desc: "עשיר בסיבים, עם זרעי כמון", price: 36, emoji: "🫓", bg: "#E1F5EE", accent: "#1D9E75" },
            { id: 4, name: "פיתות ביתיות (6 יח׳)", desc: "טריות, אוורריות ורכות", price: 24, emoji: "🫔", bg: "#EEEDFE", accent: "#7F77DD" },
        ];

        const DAYS = ["יום חמישי", "יום שישי"];
        const TIMES = { "יום חמישי": ["14:00", "15:00", "16:00", "17:00", "18:00"], "יום שישי": ["08:00", "09:00", "10:00", "11:00", "12:00"] };

        function App() {
            const [cart, setCart] = useState({});
            const [screen, setScreen] = useState("home");
            const [form, setForm] = useState({ name: "", phone: "", day: "יום שישי", time: "09:00" });
            const [paying, setPaying] = useState(false);

            const total = Object.entries(cart).reduce((s, [id, q]) => s + (PRODUCTS.find(p => p.id == id).price * q), 0);
            
            const handlePay = async () => {
                if(!form.name || !form.phone) return alert("נא למלא שם וטלפון");
                setPaying(true);
                try {
                    await fetch("https://hook.eu1.make.com/v90j9kxeibgy1mftgvl5jliuiclb24ny", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ ...form, cart, total })
                    });
                    setScreen("confirm");
                } catch { alert("שגיאה"); }
                setPaying(false);
            };

            if (screen === "confirm") return <div style={{textAlign:'center', padding:50}}>✅ הזמנה אושרה! נתראה ב-{form.day}</div>;

            if (screen === "order") return (
                <div style={{maxWidth:400, margin:'auto', padding:20}}>
                    <input placeholder="שם מלא" onChange={e=>setForm({...form, name:e.target.value})} />
                    <input placeholder="טלפון" onChange={e=>setForm({...form, phone:e.target.value})} />
                    <select onChange={e=>setForm({...form, day:e.target.value, time:TIMES[e.target.value][0]})}>
                        {DAYS.map(d => <option key={d}>{d}</option>)}
                    </select>
                    <select onChange={e=>setForm({...form, time:e.target.value})}>
                        {TIMES[form.day].map(t => <option key={t}>{t}</option>)}
                    </select>
                    <button onClick={handlePay} disabled={paying}>שלם {total}₪</button>
                    <button onClick={()=>setScreen("home")}>חזור</button>
                </div>
            );

            return (
                <div style={{maxWidth:400, margin:'auto', padding:20}}>
                    {PRODUCTS.map(p => (
                        <div key={p.id}>
                            {p.emoji} {p.name} - {p.price}₪
                            <button onClick={()=>setCart({...cart, [p.id]: (cart[p.id]||0)+1})}>+</button>
                        </div>
                    ))}
                    <button onClick={()=>setScreen("order")}>המשך להזמנה</button>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
