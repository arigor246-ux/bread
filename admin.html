<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול — הבית של הלחמים</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c8955a;
      --gold-dim: rgba(200,149,90,.35);
      --bg: #0d0906;
      --bg2: #141009;
      --bg3: #1a1309;
      --text: #f0e6d3;
      --text-dim: rgba(240,230,210,.5);
      --border: rgba(200,149,90,.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', Arial, sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; }

    /* LOGIN */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-box {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 48px 36px; width: min(380px, 100%); text-align: center;
    }
    .login-box .logo { font-size: 3rem; margin-bottom: 14px; }
    .login-box h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .login-box p { color: var(--text-dim); font-size: .85rem; margin-bottom: 32px; }
    .login-box input {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
      padding: 13px; font-size: 1rem; text-align: center; color: var(--text);
      margin-bottom: 12px; direction: ltr; letter-spacing: 6px; font-family: inherit;
    }
    .login-box input:focus { outline: none; border-color: var(--gold); }
    .login-box button {
      width: 100%; background: var(--gold); color: var(--bg); border: none;
      padding: 13px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity .2s;
    }
    .login-box button:hover { opacity: .85; }
    .login-error { color: #e05050; font-size: .82rem; margin-top: 10px; }

    /* MAIN */
    .main { display: none; }
    .main.show { display: block; }

    /* HEADER */
    .admin-header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .admin-logo { font-size: 1rem; font-weight: 700; padding: 18px 0; white-space: nowrap; }
    .admin-logo span { color: var(--gold); }

    /* TABS */
    .tabs { display: flex; gap: 0; }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-dim); padding: 20px 18px; font-size: .88rem;
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: color .2s, border-color .2s; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    .header-actions { display: flex; gap: 8px; align-items: center; }
    .refresh-btn, .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 7px 14px; font-size: .8rem; cursor: pointer; font-family: inherit;
      transition: all .2s;
    }
    .refresh-btn:hover, .logout-btn:hover { border-color: var(--gold-dim); color: var(--text); }

    /* STATS */
    .stats { display: flex; gap: 2px; padding: 20px; flex-wrap: wrap; }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 20px 24px; flex: 1; min-width: 130px; text-align: center;
    }
    .stat-card .val { font-size: 2rem; font-weight: 900; color: var(--gold); }
    .stat-card .lbl { font-size: .75rem; color: var(--text-dim); margin-top: 4px; letter-spacing: .5px; text-transform: uppercase; }

    /* PANELS */
    .panel { display: none; padding: 20px; }
    .panel.active { display: block; }

    /* FILTERS */
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-btn {
      border: 1px solid var(--border); background: var(--bg2); color: var(--text-dim);
      padding: 7px 16px; font-size: .8rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--gold-dim); color: var(--text); }
    .filter-btn.active { border-color: var(--gold); background: rgba(200,149,90,.1); color: var(--gold); }
    .search-box {
      border: 1px solid var(--border); background: rgba(255,255,255,.03);
      padding: 7px 14px; font-size: .88rem; direction: rtl; color: var(--text);
      font-family: inherit; flex: 1; min-width: 180px;
    }
    .search-box:focus { outline: none; border-color: var(--gold); }

    /* ORDER CARDS */
    .orders-list { display: flex; flex-direction: column; gap: 2px; }
    .order-card { background: var(--bg2); border: 1px solid var(--border); }
    .order-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; cursor: pointer; gap: 12px; flex-wrap: wrap;
    }
    .order-header:hover { background: rgba(200,149,90,.04); }
    .order-num { font-size: .7rem; color: var(--text-dim); margin-bottom: 2px; }
    .order-name { font-weight: 700; font-size: .95rem; }
    .order-meta { font-size: .78rem; color: var(--text-dim); margin-top: 2px; }
    .badge { padding: 3px 10px; font-size: .72rem; font-weight: 700; }
    .badge-new   { background: rgba(255,200,50,.12); color: #f0c040; border: 1px solid rgba(255,200,50,.2); }
    .badge-prep  { background: rgba(80,160,255,.12); color: #60aaff; border: 1px solid rgba(80,160,255,.2); }
    .badge-ready { background: rgba(80,200,120,.12); color: #50c878; border: 1px solid rgba(80,200,120,.2); }
    .badge-done  { background: rgba(150,150,150,.1); color: #aaa; border: 1px solid rgba(150,150,150,.15); }
    .order-total { font-weight: 700; color: var(--gold); white-space: nowrap; }
    .order-body { border-top: 1px solid var(--border); padding: 16px 18px; display: none; }
    .order-body.open { display: block; }
    .items-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: .85rem; }
    .items-table th { text-align: right; color: var(--text-dim); font-weight: 600; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; }
    .items-table td { padding: 8px 0; border-bottom: 1px solid rgba(200,149,90,.06); }
    .order-info-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; font-size: .85rem; }
    .order-info-row span { color: var(--text-dim); }
    .pay-badge { display: inline-block; padding: 2px 10px; font-size: .78rem; font-weight: 600; border: 1px solid var(--border); }
    .pay-bit    { color: #50c878; border-color: rgba(80,200,120,.3); }
    .pay-paypal { color: #60aaff; border-color: rgba(80,160,255,.3); }
    .pay-cash   { color: #f0c040; border-color: rgba(255,200,50,.3); }
    .note-box { background: rgba(200,149,90,.06); border: 1px solid rgba(200,149,90,.15); padding: 10px 12px; font-size: .83rem; color: var(--text-dim); margin-bottom: 16px; }
    .status-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .status-btn {
      border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); padding: 6px 12px; font-size: .78rem;
      font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .status-btn:hover { border-color: var(--gold-dim); color: var(--text); }
    .status-btn.active-status { background: var(--gold); color: var(--bg); border-color: var(--gold); }
    .delete-btn {
      margin-right: auto; border: 1px solid rgba(220,80,80,.25); background: transparent;
      color: rgba(220,80,80,.7); padding: 6px 12px; font-size: .78rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .delete-btn:hover { background: rgba(220,80,80,.15); color: #e05050; border-color: rgba(220,80,80,.5); }
    .empty-state { text-align: center; padding: 60px; color: var(--text-dim); }

    /* GALLERY PANEL */
    .gallery-panel-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2px;
      margin-top: 16px;
    }
    .gallery-panel-item {
      position: relative; aspect-ratio: 1; background: var(--bg2);
      border: 1px solid var(--border); overflow: hidden;
    }
    .gallery-panel-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-panel-item .item-overlay {
      position: absolute; inset: 0; background: rgba(13,9,6,.75);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; opacity: 0; transition: opacity .2s;
    }
    .gallery-panel-item:hover .item-overlay { opacity: 1; }
    .gallery-panel-item .item-caption { font-size: .78rem; color: var(--text-dim); padding: 6px 10px; text-align: center; }
    .img-del-btn {
      background: rgba(220,80,80,.8); color: #fff; border: none;
      padding: 8px 16px; font-size: .8rem; cursor: pointer; font-family: inherit; font-weight: 600;
    }

    .upload-box {
      background: var(--bg2); border: 1px dashed var(--border);
      padding: 32px; text-align: center; margin-bottom: 16px; cursor: pointer;
      transition: border-color .2s;
    }
    .upload-box:hover { border-color: var(--gold-dim); }
    .upload-box input { display: none; }
    .upload-box .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .upload-box p { color: var(--text-dim); font-size: .88rem; }
    .upload-box strong { color: var(--gold); }

    .caption-input {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
      padding: 10px 12px; font-size: .9rem; color: var(--text);
      direction: rtl; font-family: inherit; margin-bottom: 10px;
    }
    .caption-input:focus { outline: none; border-color: var(--gold); }

    .action-btn {
      background: var(--gold); color: var(--bg); border: none;
      padding: 11px 24px; font-size: .9rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: opacity .2s;
    }
    .action-btn:hover { opacity: .85; }
    .action-btn:disabled { background: #333; color: #555; cursor: default; }

    /* ABOUT PANEL */
    .about-edit-wrap { max-width: 700px; }
    .about-edit-wrap label { display: block; font-size: .75rem; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; letter-spacing: .5px; text-transform: uppercase; }
    .about-textarea {
      width: 100%; min-height: 240px; background: rgba(255,255,255,.04);
      border: 1px solid var(--border); padding: 14px; font-size: .95rem;
      color: var(--text); direction: rtl; font-family: inherit; resize: vertical;
      margin-bottom: 12px;
    }
    .about-textarea:focus { outline: none; border-color: var(--gold); }
    .save-note { font-size: .78rem; color: var(--text-dim); margin-top: 8px; }
    .save-success { color: #50c878; font-size: .82rem; margin-top: 8px; }

    .preview-box {
      margin-top: 24px; background: var(--bg2); border: 1px solid var(--border); padding: 20px;
    }
    .preview-box h4 { font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 12px; }
    .preview-box p { font-size: .9rem; line-height: 1.9; color: rgba(240,230,210,.8); }

    /* PRODUCTS PANEL */
    .products-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 24px; }
    .product-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg2); border: 1px solid var(--border); padding: 14px 18px;
    }
    .product-name { font-weight: 600; flex: 1; }
    .product-price { color: var(--gold); font-weight: 700; min-width: 60px; }
    .stock-toggle {
      border: 1px solid var(--border); background: transparent; color: var(--text-dim);
      padding: 5px 12px; font-size: .75rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .2s; white-space: nowrap;
    }
    .stock-toggle.in-stock { border-color: rgba(80,200,120,.4); color: #50c878; }
    .stock-toggle.out-stock { border-color: rgba(220,80,80,.3); color: rgba(220,80,80,.7); }
    .add-product-form {
      background: var(--bg2); border: 1px solid var(--border); padding: 24px; margin-bottom: 16px;
    }
    .add-product-form h4 { font-size: .8rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-input {
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      padding: 10px 12px; font-size: .9rem; color: var(--text);
      direction: rtl; font-family: inherit; flex: 1; min-width: 120px;
    }
    .form-input:focus { outline: none; border-color: var(--gold); }

    /* REVIEWS PANEL */
    .reviews-admin-list { display: flex; flex-direction: column; gap: 2px; }
    .review-admin-card {
      background: var(--bg2); border: 1px solid var(--border); padding: 16px 18px;
      display: flex; gap: 16px; align-items: flex-start;
    }
    .review-admin-stars { color: var(--gold); font-size: .9rem; white-space: nowrap; }
    .review-admin-body { flex: 1; }
    .review-admin-name { font-weight: 700; font-size: .88rem; margin-bottom: 4px; }
    .review-admin-text { font-size: .83rem; color: var(--text-dim); line-height: 1.6; }

    /* DASHBOARD */
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 2px; padding: 20px; }
    .dash-card { background: var(--bg2); border: 1px solid var(--border); padding: 22px 20px; }
    .dash-card .d-val { font-size: 2rem; font-weight: 900; color: var(--gold); }
    .dash-card .d-lbl { font-size: .72rem; color: var(--text-dim); margin-top: 4px; letter-spacing: .5px; text-transform: uppercase; }
    .dash-section { background: var(--bg2); border: 1px solid var(--border); padding: 20px; }
    .dash-section h4 { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 14px; }
    .dash-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(200,149,90,.06); font-size: .85rem; }
    .dash-row:last-child { border-bottom: none; }
    .dash-row .dr-val { font-weight: 700; color: var(--gold); }

    /* TOGGLE SWITCH */
    .toggle-wrap { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--bg3); border: 1px solid var(--border); cursor: pointer; transition: .3s; }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: var(--text-dim); transition: .3s; }
    .toggle-wrap input:checked + .toggle-slider { background: rgba(80,200,120,.2); border-color: #50c878; }
    .toggle-wrap input:checked + .toggle-slider::before { background: #50c878; transform: translateX(20px); }

    /* PRODUCT THUMBNAIL */
    .prod-thumb { width: 44px; height: 44px; object-fit: cover; border: 1px solid var(--border); display: block; flex-shrink: 0; }
    .prod-thumb-placeholder { width: 44px; height: 44px; background: var(--bg3); border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; font-size: .65rem; color: var(--text-dim); flex-shrink: 0; cursor: pointer; text-align: center; }
    .img-edit-btn { border: 1px solid var(--border); background: transparent; color: var(--text-dim); padding: 4px 10px; font-size: .72rem; cursor: pointer; font-family: inherit; transition: all .2s; }
    .img-edit-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

    @media (max-width: 600px) {
      .tabs { overflow-x: auto; }
      .tab-btn { padding: 18px 12px; font-size: .8rem; }
      .gallery-panel-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="logo">🍞</div>
    <h1>פורטל ניהול</h1>
    <p>הבית של הלחמים</p>
    <input type="password" id="pwd-input" placeholder="סיסמה" onkeydown="if(event.key==='Enter')tryLogin()" />
    <button onclick="tryLogin()">כניסה</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-portal">
  <header class="admin-header">
    <div class="admin-logo">🍞 <span>ניהול</span></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('orders',this)">📋 הזמנות</button>
      <button class="tab-btn" onclick="switchTab('dashboard',this)">📊 דשבורד</button>
      <button class="tab-btn" onclick="switchTab('products',this)">🛒 מוצרים</button>
      <button class="tab-btn" onclick="switchTab('reviews',this)">⭐ ביקורות</button>
      <button class="tab-btn" onclick="switchTab('gallery',this)">📷 גלריה</button>
      <button class="tab-btn" onclick="switchTab('about',this)">📖 אודות</button>
      <button class="tab-btn" onclick="switchTab('announce',this)">📢 הודעות</button>
    </div>
    <div class="header-actions">
      <button class="refresh-btn" onclick="loadOrders()">🔄</button>
      <button class="logout-btn" onclick="logout()">יציאה</button>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card"><div class="val" id="stat-today">0</div><div class="lbl">הזמנות היום</div></div>
    <div class="stat-card"><div class="val" id="stat-new">0</div><div class="lbl">חדשות</div></div>
    <div class="stat-card"><div class="val" id="stat-rev">0</div><div class="lbl">הכנסות היום ₪</div></div>
    <div class="stat-card"><div class="val" id="stat-all">0</div><div class="lbl">סה"כ הזמנות</div></div>
  </div>

  <!-- ORDERS PANEL -->
  <div class="panel active" id="panel-orders">
    <div class="toolbar">
      <button class="filter-btn active" onclick="setFilter('all',this)">הכל</button>
      <button class="filter-btn" onclick="setFilter('new',this)">חדשות 🆕</button>
      <button class="filter-btn" onclick="setFilter('prep',this)">בהכנה 👩‍🍳</button>
      <button class="filter-btn" onclick="setFilter('ready',this)">מוכן 📦</button>
      <button class="filter-btn" onclick="setFilter('done',this)">הושלם ✅</button>
      <input class="search-box" id="search-input" placeholder="חיפוש שם..." oninput="renderOrders()" />
    </div>
    <div class="orders-list" id="orders-list"></div>
  </div>

  <!-- DASHBOARD PANEL -->
  <div class="panel" id="panel-dashboard">
    <div class="dash-grid" id="dash-grid">
      <div style="color:var(--text-dim);padding:40px">טוען נתונים...</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:2px">
      <div class="dash-section" id="dash-top-products"></div>
      <div class="dash-section" id="dash-pay-split"></div>
    </div>
  </div>

  <!-- ANNOUNCEMENT PANEL -->
  <div class="panel" id="panel-announce">
    <div class="about-edit-wrap">
      <div style="background:var(--bg2);border:1px solid var(--border);padding:24px;margin-bottom:16px">
        <p style="font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:20px">הודעה לאתר</p>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <label style="font-size:.82rem;color:var(--text-dim)">הצג הודעה:</label>
          <label class="toggle-wrap">
            <input type="checkbox" id="ann-active" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <label style="font-size:.75rem;color:var(--text-dim);letter-spacing:.5px;display:block;margin-bottom:8px">טקסט ההודעה</label>
        <input class="caption-input" id="ann-text" placeholder="לדוגמה: סגורים ב-26/6 — חוזרים ב-28/6" style="margin-bottom:14px" />
        <label style="font-size:.75rem;color:var(--text-dim);letter-spacing:.5px;display:block;margin-bottom:8px">צבע רקע</label>
        <div style="display:flex;gap:8px;margin-bottom:20px">
          <button class="color-btn active-color" id="col-gold" onclick="setAnnColor('gold',this)" style="background:#4a3010;color:#f4ece0;border:2px solid var(--gold);padding:8px 18px;cursor:pointer;font-family:inherit;font-size:.8rem">זהב</button>
          <button class="color-btn" id="col-red" onclick="setAnnColor('red',this)" style="background:#3a0a0a;color:#f4ece0;border:2px solid transparent;padding:8px 18px;cursor:pointer;font-family:inherit;font-size:.8rem">אדום</button>
          <button class="color-btn" id="col-green" onclick="setAnnColor('green',this)" style="background:#0a2a1a;color:#f4ece0;border:2px solid transparent;padding:8px 18px;cursor:pointer;font-family:inherit;font-size:.8rem">ירוק</button>
        </div>
        <button class="action-btn" onclick="saveAnnouncement()">שמור הודעה</button>
        <div id="ann-save-msg" style="margin-top:10px;font-size:.82rem"></div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);padding:16px">
        <p style="font-size:.72rem;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">תצוגה מקדימה</p>
        <div id="ann-preview" style="padding:12px 20px;text-align:center;font-size:.83rem;font-weight:600;background:#4a3010;color:#f4ece0;display:none"></div>
      </div>
    </div>
  </div>

  <!-- PRODUCTS PANEL -->
  <div class="panel" id="panel-products">
    <div class="add-product-form">
      <h4>הוספת מוצר חדש</h4>
      <div class="form-row">
        <input class="form-input" id="new-prod-name" placeholder="שם המוצר" />
        <input class="form-input" id="new-prod-price" type="number" placeholder="מחיר ₪" style="max-width:120px" />
        <input class="form-input" id="new-prod-img" placeholder="לינק לתמונה (אופציונלי)" />
        <button class="action-btn" onclick="addProduct()">הוסף</button>
      </div>
    </div>
    <div class="products-list" id="products-list">
      <div style="color:var(--text-dim);padding:20px">טוען מוצרים...</div>
    </div>
  </div>

  <!-- REVIEWS PANEL -->
  <div class="panel" id="panel-reviews">
    <div class="reviews-admin-list" id="reviews-admin-list">
      <div style="color:var(--text-dim);padding:20px">טוען ביקורות...</div>
    </div>
  </div>

  <!-- GALLERY PANEL -->
  <div class="panel" id="panel-gallery">
    <div style="background:var(--bg2);border:1px solid var(--border);padding:24px;margin-bottom:16px">
      <p style="font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px">הוספת תמונה</p>
      <input class="caption-input" id="img-url" placeholder="הדבקי כאן לינק לתמונה (URL)" oninput="previewUrl()" style="margin-bottom:10px" />
      <input class="caption-input" id="img-caption" placeholder="כיתוב לתמונה (אופציונלי)" style="margin-bottom:14px" />
      <div id="url-preview" style="display:none;margin-bottom:14px">
        <img id="preview-img" style="width:100%;max-height:200px;object-fit:cover;display:block;border:1px solid var(--border)" />
      </div>
      <button class="action-btn" id="upload-btn" onclick="addImageByUrl()">הוסף תמונה</button>
      <p style="font-size:.72rem;color:var(--text-dim);margin-top:10px">טיפ: העלי תמונה ל-<strong style="color:var(--gold)">imgur.com</strong> וקבלי לינק ישיר</p>
    </div>
    <div class="gallery-panel-grid" id="gallery-panel-grid">
      <div style="color:var(--text-dim);padding:20px">טוען...</div>
    </div>
  </div>

  <!-- ABOUT PANEL -->
  <div class="panel" id="panel-about">
    <div class="about-edit-wrap">
      <div class="form-group" style="margin-bottom:16px">
        <label>טקסט אודות</label>
        <textarea class="about-textarea" id="about-text">המאפייה הוקמה בשלהי 2025 בזמן מלחמת עם כלביא על ידי יהודית גורדון, שהצליחה להביא את אומנות המטבח הצרפתי אל תוך מטבחה הביתי.

מתוך אהבה עמוקה לאפייה ורצון לשמר טעמים אותנטיים, יהודית הפכה את המטבח שלה למאפייה קטנה ואוהבת — שם כל כיכר לחם מקבלת תשומת לב ואהבה.</textarea>
      </div>
      <button class="action-btn" onclick="saveAbout()">שמירת טקסט</button>
      <div id="about-save-msg"></div>

      <div class="preview-box">
        <h4>תצוגה מקדימה</h4>
        <p id="about-preview"></p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc,
    setDoc, getDoc, orderBy, query, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAhsIFvSJdlSTv9qC-7eeX5o7UsQdc7CTU",
    authDomain: "habait-shel-halechem.firebaseapp.com",
    projectId: "habait-shel-halechem",
    storageBucket: "habait-shel-halechem.firebasestorage.app",
    messagingSenderId: "299461810655",
    appId: "1:299461810655:web:b82f98d708e20931a80c6a"
  };

  const ADMIN_PASSWORD = "121465"; // ← שני את הסיסמה כאן

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allOrders = [], currentFilter = 'all', selectedFile = null;

  // ── AUTH ──
  window.tryLogin = () => {
    if (document.getElementById('pwd-input').value === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-portal').classList.add('show');
      loadOrders();
      loadProducts();
      loadAdminReviews();
      loadGalleryPanel();
      loadAboutText();
      loadAnnouncementAdmin();
    } else {
      document.getElementById('login-error').textContent = 'סיסמה שגויה ✕';
    }
  };
  window.logout = () => {
    document.getElementById('login-screen').style.display = '';
    document.getElementById('main-portal').classList.remove('show');
    document.getElementById('pwd-input').value = '';
  };

  // ── ORDERS ──
  window.loadOrders = async () => {
    const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats(); renderOrders();
  };

  function updateStats() {
    const today = new Date().toDateString();
    const todayO = allOrders.filter(o => o.createdAt && new Date(o.createdAt.seconds * 1000).toDateString() === today);
    document.getElementById('stat-today').textContent = todayO.length;
    document.getElementById('stat-new').textContent = allOrders.filter(o => o.status === 'new').length;
    document.getElementById('stat-rev').textContent = todayO.reduce((s, o) => s + (o.total || 0), 0);
    document.getElementById('stat-all').textContent = allOrders.length;
  }

  window.setFilter = (f, btn) => {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  };

  window.renderOrders = () => {
    const search = document.getElementById('search-input').value.trim().toLowerCase();
    let list = allOrders;
    if (currentFilter !== 'all') list = list.filter(o => o.status === currentFilter);
    if (search) list = list.filter(o => o.name?.toLowerCase().includes(search) || o.phone?.includes(search));
    const el = document.getElementById('orders-list');
    if (!list.length) { el.innerHTML = '<div class="empty-state">אין הזמנות 🕊️</div>'; return; }
    el.innerHTML = list.map((o, i) => {
      const date = o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleString('he-IL') : '—';
      const statusLabel = { new:'חדשה', prep:'בהכנה', ready:'מוכן', done:'הושלם' }[o.status] || o.status;
      const badgeClass = { new:'badge-new', prep:'badge-prep', ready:'badge-ready', done:'badge-done' }[o.status] || 'badge-new';
      const payClass = { bit:'pay-bit', paypal:'pay-paypal', cash:'pay-cash' }[o.payment] || '';
      const payLabel = { bit:'ביט 💚', paypal:'PayPal 🅿️', cash:'מזומן 💵' }[o.payment] || o.payment;
      const rows = (o.items || []).map(it => `<tr><td>${it.emoji || ''} ${it.name}</td><td>${it.qty}</td><td>${it.price} ₪</td><td><strong>${it.subtotal} ₪</strong></td></tr>`).join('');
      const sBtns = ['new','prep','ready','done'].map(s => {
        const lbl = { new:'חדשה 🆕', prep:'בהכנה 👩‍🍳', ready:'מוכן 📦', done:'הושלם ✅' }[s];
        return `<button class="status-btn ${o.status===s?'active-status':''}" onclick="changeStatus('${o.id}','${s}')">${lbl}</button>`;
      }).join('');
      return `<div class="order-card">
        <div class="order-header" onclick="toggleBody('${o.id}')">
          <div>
            <div class="order-num">#${allOrders.length - i} · ${date}</div>
            <div class="order-name">${o.name}</div>
            <div class="order-meta">${o.phone}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="badge ${badgeClass}">${statusLabel}</span>
            <span class="order-total">${o.total} ₪</span>
            <span style="color:var(--text-dim);font-size:.8rem">▼</span>
          </div>
        </div>
        <div class="order-body" id="body-${o.id}">
          <div class="order-info-row">
            <div><span>תשלום: </span><span class="pay-badge ${payClass}">${payLabel}</span></div>
            <div><span>טלפון: </span><a href="tel:${o.phone}" style="color:var(--gold)">${o.phone}</a></div>
            ${o.pickupDate ? `<div><span>איסוף: </span><strong style="color:var(--gold)">📅 ${o.pickupDate} · ${o.pickupSlot || ''} ${o.pickupTime}</strong></div>` : ''}
          </div>
          ${o.note ? `<div class="note-box">📝 ${o.note}</div>` : ''}
          <table class="items-table">
            <thead><tr><th>מוצר</th><th>כמות</th><th>מחיר</th><th>סכום</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div style="font-weight:700;color:var(--gold);margin-bottom:16px">סה"כ: ${o.total} ₪</div>
          <div class="status-actions">${sBtns}<button class="delete-btn" onclick="deleteOrder('${o.id}')">🗑️ מחק</button></div>
        </div>
      </div>`;
    }).join('');
  };

  window.toggleBody = (id) => document.getElementById('body-' + id).classList.toggle('open');

  window.changeStatus = async (id, status) => {
    await updateDoc(doc(db, 'orders', id), { status });
    allOrders.find(o => o.id === id).status = status;
    updateStats(); renderOrders();
  };

  window.deleteOrder = async (id) => {
    if (!confirm('למחוק הזמנה?')) return;
    await deleteDoc(doc(db, 'orders', id));
    allOrders = allOrders.filter(o => o.id !== id);
    updateStats(); renderOrders();
  };

  // ── PRODUCTS ──
  const DEFAULT_PRODUCTS = [
    { name:'בגטים', price:12 }, { name:'לחם לבן', price:30 }, { name:'קוסמין לבן', price:38 },
    { name:'פוקצ׳ה בינונית', price:60 }, { name:'ג׳בטה', price:10 }, { name:'סינבון חלבי', price:80 },
    { name:'חמאת בזיליקום פלטה', price:80 }, { name:'שמרים פרווה', price:65 }, { name:'חלות', price:40 },
  ];
  let adminProducts = [];

  async function loadProducts() {
    const snap = await getDocs(query(collection(db,'products'), orderBy('order','asc')));
    if (snap.empty) {
      // seed default products
      for (let i = 0; i < DEFAULT_PRODUCTS.length; i++) {
        await addDoc(collection(db,'products'), { ...DEFAULT_PRODUCTS[i], inStock: true, order: i+1, createdAt: serverTimestamp() });
      }
      return loadProducts();
    }
    adminProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProducts();
  }

  function renderProducts() {
    const el = document.getElementById('products-list');
    if (!adminProducts.length) { el.innerHTML = '<div class="empty-state">אין מוצרים</div>'; return; }
    el.innerHTML = adminProducts.map(p => {
      const thumb = p.imageUrl
        ? `<img class="prod-thumb" src="${p.imageUrl}" alt="${p.name}" />`
        : `<div class="prod-thumb-placeholder" onclick="promptProductImage('${p.id}')">+ תמונה</div>`;
      return `<div class="product-row">
        ${thumb}
        <span class="product-name">${p.name}</span>
        <span class="product-price">${p.price} ₪</span>
        ${p.imageUrl ? `<button class="img-edit-btn" onclick="promptProductImage('${p.id}')">🖼 תמונה</button>` : ''}
        <button class="stock-toggle ${p.inStock!==false?'in-stock':'out-stock'}" onclick="toggleStock('${p.id}',${p.inStock!==false})">
          ${p.inStock!==false ? '✓ במלאי' : '✗ אזל'}
        </button>
        <button class="delete-btn" onclick="deleteProduct('${p.id}')">🗑️</button>
      </div>`;
    }).join('');
  }

  window.promptProductImage = async (id) => {
    const p = adminProducts.find(x => x.id === id);
    const url = prompt(`לינק לתמונה עבור "${p.name}":`, p.imageUrl || '');
    if (url === null) return;
    await updateDoc(doc(db,'products',id), { imageUrl: url.trim() || null });
    p.imageUrl = url.trim() || null;
    renderProducts();
  };

  window.addProduct = async () => {
    const name = document.getElementById('new-prod-name').value.trim();
    const price = parseInt(document.getElementById('new-prod-price').value);
    const imageUrl = document.getElementById('new-prod-img').value.trim() || null;
    if (!name || !price) { alert('נא למלא שם ומחיר'); return; }
    const order = adminProducts.length + 1;
    const ref = await addDoc(collection(db,'products'), { name, price, inStock: true, order, imageUrl, createdAt: serverTimestamp() });
    adminProducts.push({ id: ref.id, name, price, inStock: true, order, imageUrl });
    renderProducts();
    document.getElementById('new-prod-name').value = '';
    document.getElementById('new-prod-price').value = '';
    document.getElementById('new-prod-img').value = '';
  };

  window.toggleStock = async (id, isInStock) => {
    await updateDoc(doc(db,'products',id), { inStock: !isInStock });
    const p = adminProducts.find(x => x.id === id);
    if (p) p.inStock = !isInStock;
    renderProducts();
  };

  window.deleteProduct = async (id) => {
    if (!confirm('למחוק מוצר?')) return;
    await deleteDoc(doc(db,'products',id));
    adminProducts = adminProducts.filter(p => p.id !== id);
    renderProducts();
  };

  // ── REVIEWS ──
  let adminReviews = [];

  async function loadAdminReviews() {
    const snap = await getDocs(query(collection(db,'reviews'), orderBy('createdAt','desc')));
    adminReviews = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAdminReviews();
  }

  function renderAdminReviews() {
    const el = document.getElementById('reviews-admin-list');
    if (!adminReviews.length) { el.innerHTML = '<div class="empty-state">אין ביקורות עדיין</div>'; return; }
    el.innerHTML = adminReviews.map(r => {
      const stars = '★'.repeat(r.stars||5) + '☆'.repeat(5-(r.stars||5));
      const date = r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleDateString('he-IL') : '';
      return `<div class="review-admin-card">
        <div>
          <div class="review-admin-stars">${stars}</div>
          <div style="font-size:.7rem;color:var(--text-dim);margin-top:4px">${date}</div>
        </div>
        <div class="review-admin-body">
          <div class="review-admin-name">${r.name}</div>
          <div class="review-admin-text">${r.text}</div>
        </div>
        <button class="delete-btn" onclick="deleteReview('${r.id}')">🗑️</button>
      </div>`;
    }).join('');
  }

  window.deleteReview = async (id) => {
    if (!confirm('למחוק ביקורת?')) return;
    await deleteDoc(doc(db,'reviews',id));
    adminReviews = adminReviews.filter(r => r.id !== id);
    renderAdminReviews();
  };

  // ── GALLERY ──
  let galleryDocs = [];

  async function loadGalleryPanel() {
    const snap = await getDocs(query(collection(db, 'gallery'), orderBy('createdAt', 'desc')));
    galleryDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderGalleryPanel();
  }

  function renderGalleryPanel() {
    const el = document.getElementById('gallery-panel-grid');
    if (!galleryDocs.length) { el.innerHTML = '<div style="color:var(--text-dim);padding:20px">אין תמונות עדיין</div>'; return; }
    el.innerHTML = galleryDocs.map(d => `
      <div class="gallery-panel-item">
        <img src="${d.url}" alt="${d.caption || ''}" loading="lazy" />
        <div class="item-overlay">
          ${d.caption ? `<div class="item-caption">${d.caption}</div>` : ''}
          <button class="img-del-btn" onclick="deleteImage('${d.id}')">🗑️ מחק</button>
        </div>
      </div>`).join('');
  }

  window.previewUrl = () => {
    const url = document.getElementById('img-url').value.trim();
    const preview = document.getElementById('url-preview');
    if (url) {
      document.getElementById('preview-img').src = url;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  };

  window.addImageByUrl = async () => {
    const url = document.getElementById('img-url').value.trim();
    if (!url) { alert('נא להכניס לינק לתמונה'); return; }
    const btn = document.getElementById('upload-btn');
    btn.disabled = true; btn.textContent = 'שומר...';
    try {
      const caption = document.getElementById('img-caption').value.trim();
      const docRef = await addDoc(collection(db, 'gallery'), { url, caption, createdAt: serverTimestamp() });
      galleryDocs.unshift({ id: docRef.id, url, caption });
      renderGalleryPanel();
      document.getElementById('img-url').value = '';
      document.getElementById('img-caption').value = '';
      document.getElementById('url-preview').style.display = 'none';
    } catch (e) {
      console.error(e); alert('שגיאה בשמירה');
    } finally {
      btn.disabled = false; btn.textContent = 'הוסף תמונה';
    }
  };

  window.deleteImage = async (id) => {
    if (!confirm('למחוק תמונה?')) return;
    await deleteDoc(doc(db, 'gallery', id));
    galleryDocs = galleryDocs.filter(d => d.id !== id);
    renderGalleryPanel();
  };

  // ── ABOUT ──
  async function loadAboutText() {
    try {
      const snap = await getDoc(doc(db, 'settings', 'about'));
      if (snap.exists() && snap.data().text) {
        document.getElementById('about-text').value = snap.data().text;
        updatePreview();
      }
    } catch {}
  }

  function updatePreview() {
    const text = document.getElementById('about-text').value;
    document.getElementById('about-preview').innerHTML = text.replace(/\n/g, '<br />');
  }

  document.getElementById('about-text')?.addEventListener('input', updatePreview);

  window.saveAbout = async () => {
    const text = document.getElementById('about-text').value.trim();
    const msg = document.getElementById('about-save-msg');
    try {
      await setDoc(doc(db, 'settings', 'about'), { text });
      msg.className = 'save-success'; msg.textContent = '✓ נשמר בהצלחה';
    } catch (e) {
      msg.style.color = '#e05050'; msg.textContent = 'שגיאה בשמירה';
    }
    setTimeout(() => { msg.textContent = ''; }, 3000);
  };

  updatePreview();

  // ── DASHBOARD ──
  window.switchTab = (name, btn) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'dashboard') renderDashboard();
  };

  function renderDashboard() {
    if (!allOrders.length) {
      document.getElementById('dash-grid').innerHTML = '<div style="color:var(--text-dim);padding:40px">אין נתונים עדיין</div>';
      return;
    }
    const now = new Date();
    const weekAgo = new Date(now - 7 * 864e5);
    const weekOrders = allOrders.filter(o => o.createdAt && new Date(o.createdAt.seconds * 1000) > weekAgo);
    const totalRev = allOrders.reduce((s, o) => s + (o.total || 0), 0);
    const weekRev = weekOrders.reduce((s, o) => s + (o.total || 0), 0);
    const todayStr = now.toDateString();
    const todayOrders = allOrders.filter(o => o.createdAt && new Date(o.createdAt.seconds * 1000).toDateString() === todayStr);

    document.getElementById('dash-grid').innerHTML = `
      <div class="dash-card"><div class="d-val">${allOrders.length}</div><div class="d-lbl">סה"כ הזמנות</div></div>
      <div class="dash-card"><div class="d-val">${totalRev} ₪</div><div class="d-lbl">סה"כ הכנסות</div></div>
      <div class="dash-card"><div class="d-val">${weekOrders.length}</div><div class="d-lbl">הזמנות השבוע</div></div>
      <div class="dash-card"><div class="d-val">${weekRev} ₪</div><div class="d-lbl">הכנסות השבוע</div></div>
      <div class="dash-card"><div class="d-val">${todayOrders.length}</div><div class="d-lbl">הזמנות היום</div></div>
      <div class="dash-card"><div class="d-val">${allOrders.filter(o=>o.status==='new').length}</div><div class="d-lbl">ממתינות לטיפול</div></div>
    `;

    // top products
    const counts = {};
    allOrders.forEach(o => (o.items||[]).forEach(it => {
      counts[it.name] = (counts[it.name] || 0) + (it.qty || 1);
    }));
    const top = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 6);
    document.getElementById('dash-top-products').innerHTML = `
      <h4>המוצרים הנמכרים ביותר</h4>
      ${top.length ? top.map(([n,q]) => `<div class="dash-row"><span>${n}</span><span class="dr-val">${q} יח'</span></div>`).join('') : '<div style="color:var(--text-dim);font-size:.83rem">אין נתונים</div>'}
    `;

    // payment split
    const payCount = { bit: 0, cash: 0 };
    allOrders.forEach(o => { if (o.payment in payCount) payCount[o.payment]++; });
    document.getElementById('dash-pay-split').innerHTML = `
      <h4>פיצול תשלומים</h4>
      <div class="dash-row"><span>💚 ביט</span><span class="dr-val">${payCount.bit}</span></div>
      <div class="dash-row"><span>💵 תשלום במקום</span><span class="dr-val">${payCount.cash}</span></div>
    `;
  }

  // ── ANNOUNCEMENT ──
  let annColor = 'gold';

  async function loadAnnouncementAdmin() {
    try {
      const snap = await getDoc(doc(db,'settings','announcement'));
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById('ann-active').checked = !!d.active;
        document.getElementById('ann-text').value = d.text || '';
        if (d.color) setAnnColor(d.color, document.getElementById('col-' + d.color));
        updateAnnPreview();
      }
    } catch {}
  }

  window.setAnnColor = (color, btn) => {
    annColor = color;
    document.querySelectorAll('.color-btn').forEach(b => b.style.borderColor = 'transparent');
    btn.style.borderColor = 'var(--gold)';
    updateAnnPreview();
  };

  document.getElementById('ann-text')?.addEventListener('input', updateAnnPreview);
  document.getElementById('ann-active')?.addEventListener('change', updateAnnPreview);

  function updateAnnPreview() {
    const text = document.getElementById('ann-text')?.value || '';
    const active = document.getElementById('ann-active')?.checked;
    const preview = document.getElementById('ann-preview');
    if (!preview) return;
    if (text && active) {
      const bg = annColor === 'red' ? '#7a1a1a' : annColor === 'green' ? '#1a4a2a' : '#4a3010';
      preview.style.background = bg;
      preview.textContent = text;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  }

  window.saveAnnouncement = async () => {
    const text = document.getElementById('ann-text').value.trim();
    const active = document.getElementById('ann-active').checked;
    const msg = document.getElementById('ann-save-msg');
    try {
      await setDoc(doc(db,'settings','announcement'), { text, active, color: annColor });
      msg.style.color = '#50c878'; msg.textContent = '✓ נשמר בהצלחה';
    } catch { msg.style.color = '#e05050'; msg.textContent = 'שגיאה בשמירה'; }
    setTimeout(() => { msg.textContent = ''; }, 3000);
  };
</script>
</body>
</html>
